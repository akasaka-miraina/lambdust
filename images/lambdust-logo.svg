<?xml version="1.0" encoding="UTF-8"?>
<svg width="200" height="80" viewBox="0 0 200 80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="lambdaGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#F7931E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFD23F;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2C3E50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#34495E;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle for lambda -->
  <circle cx="35" cy="40" r="30" fill="url(#lambdaGradient)" opacity="0.1"/>
  
  <!-- Lambda symbol -->
  <path d="M20 60 L35 30 L50 60 M35 30 L35 20" 
        stroke="url(#lambdaGradient)" 
        stroke-width="4" 
        fill="none" 
        stroke-linecap="round" 
        stroke-linejoin="round"
        filter="url(#glow)"/>
  
  <!-- Geometric accent -->
  <polygon points="25,50 35,40 45,50" 
           fill="url(#lambdaGradient)" 
           opacity="0.3"/>
  
  <!-- Text: λust -->
  <text x="75" y="50" 
        font-family="'Times New Roman', 'Liberation Serif', Times, serif" 
        font-size="32" 
        font-weight="400" 
        font-style="italic"
        fill="url(#textGradient)">λust</text>
  
  <!-- Tagline -->
  <text x="75" y="65" 
        font-family="'Times New Roman', 'Liberation Serif', Times, serif" 
        font-size="10" 
        font-style="italic"
        fill="#7F8C8D" 
        opacity="0.8">Rust Scheme Interpreter</text>
  
  <!-- Dust particles -->
  <circle cx="170" cy="25" r="1.5" fill="#FFD23F" opacity="0.6"/>
  <circle cx="180" cy="35" r="1" fill="#F7931E" opacity="0.5"/>
  <circle cx="185" cy="20" r="1.2" fill="#FF6B35" opacity="0.4"/>
  <circle cx="175" cy="45" r="0.8" fill="#FFD23F" opacity="0.7"/>
</svg>